<header class="site-header">
  <a class="brand" routerLink="/">
    <img class="brand-mark" src="/logo-fundamento.png" alt="FundamenTO" />
  </a>

  <div class="header-actions">
    <a mat-icon-button routerLink="/cart" routerLinkActive="active-link" aria-label="Sacola" [class.bump]="cartBump()">
      <mat-icon
        [matBadge]="cart.count()"
        [matBadgeHidden]="cart.count() === 0"
        matBadgeSize="small"
        matBadgeColor="warn"
      >
        shopping_bag
      </mat-icon>
    </a>

    @if (auth.isLoggedIn()) {
      <span class="user">{{ auth.email() }}</span>
      <button mat-button (click)="logout()">Sair</button>
    } @else {
      <a mat-button routerLink="/login">Entrar</a>
    }
  </div>
</header>

<main class="container">
  <router-outlet />
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <nav class="footer-nav" aria-label="Navegação">
      <a routerLink="/" fragment="brinquedos" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Catálogo</a>
      @if (!auth.isLoggedIn()) {
        <a routerLink="/register">Cadastrar</a>
      }
      @if (auth.isAdmin()) {
        <a routerLink="/admin" routerLinkActive="active-link">Painel administrativo</a>
      }
    </nav>
    <p class="footer-note">Fundamento 3D &mdash; peças impressas sob encomenda.</p>
  </div>
</footer>
